<!DOCTYPE html><html lang="nl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title data-i18n="reset_title">Wachtwoord resetten</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="min-h-screen bg-slate-50 grid place-items-center p-4">
<div class="w-full max-w-md bg-white rounded-2xl shadow p-6">
  <h1 class="text-xl font-bold mb-4" data-i18n="reset_title">Wachtwoord resetten</h1>
  <form id="form" class="space-y-3">
    <input id="email" type="email" class="w-full border rounded px-3 py-2" placeholder="E-mail" required/>
    <button class="w-full bg-slate-900 text-white rounded py-2">Verstuur link</button>
  </form>
  <div id="msg" class="mt-3 text-sm"></div>
</div>
<script type="module">
  import { supabase } from './js/supabaseClient.js';
  import './js/i18n.js';
  const msg=document.getElementById('msg');
  document.getElementById('form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const email=document.getElementById('email').value.trim();
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: location.origin + '/update_password.html'
    });
    msg.className='mt-3 text-sm ' + (error ? 'text-red-600':'text-emerald-700');
    msg.textContent = error ? error.message : 'E-mail verzonden (check je inbox).';
  });
</script>
</body></html>
