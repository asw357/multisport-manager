<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Klassement</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">Klassement</h1>
      <nav class="flex gap-3 text-sm">
        <a class="hover:underline" href="index.html">Home</a>
        <a class="hover:underline" href="manager.html">Manager</a>
        <a class="hover:underline" href="admin.html" id="adminLink" style="display:none;">Admin</a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <section class="bg-white rounded-2xl shadow p-6">
      <div class="flex flex-wrap items-end gap-2 mb-3">
        <div class="grow">
          <label class="text-sm">Filter op editie (optioneel)</label>
          <select id="edSel" class="w-full border rounded px-3 py-2 text-sm">
            <option value="">(alle edities)</option>
          </select>
        </div>
        <button id="btnLoad" class="px-3 py-2 rounded bg-slate-900 text-white text-sm">Laden</button>
      </div>

      <table class="w-full text-sm border rounded overflow-hidden">
        <thead class="bg-slate-100"><tr>
          <th class="p-2 text-left">Manager</th><th class="p-2 text-left">E-mail</th><th class="p-2 text-right">MP</th>
        </tr></thead>
        <tbody id="body"></tbody>
      </table>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    const edSel = document.getElementById('edSel');
    const tbody = document.getElementById('body');

    const { data: session } = await supabase.auth.getSession();
    if (session?.session) {
      const uid = session.session.user.id;
      const { data: me } = await supabase.from('profiles').select('is_admin').eq('user_id', uid).single();
      if (me?.is_admin) document.getElementById('adminLink').style.display='inline';
    }

    async function loadEditions() {
      const { data } = await supabase.from('editions').select('*').order('start_date');
      (data??[]).forEach(ed=>{
        const o = document.createElement('option'); o.value = ed.id; o.textContent = ed.name; edSel.appendChild(o);
      });
    }

    async function loadStandings() {
      tbody.innerHTML='';
      const ed = edSel.value;
      if (!ed) {
        // totaal op basis van profiles.mp
        const { data } = await supabase.from('profiles').select('manager_name,email,mp').order('mp', { ascending: false });
        (data??[]).forEach(p=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td class="p-2">${p.manager_name ?? '-'}</td><td class="p-2">${p.email}</td><td class="p-2 text-right">${p.mp ?? 0}</td>`;
          tbody.appendChild(tr);
        });
      } else {
        // per editie: som mp_ledger per user_id
        const { data } = await supabase.rpc('standings_by_edition', { p_edition_id: ed });
        (data??[]).forEach(r=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td class="p-2">${r.manager_name ?? '-'}</td><td class="p-2">${r.email}</td><td class="p-2 text-right">${r.total_mp ?? 0}</td>`;
          tbody.appendChild(tr);
        });
      }
    }

    document.getElementById('btnLoad').addEventListener('click', loadStandings);
    await loadEditions();
    await loadStandings();
  </script>
</body>
</html>
