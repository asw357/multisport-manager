<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Multisport-Manager - Inloggen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-4 text-center">Inloggen</h1>
    <form id="login-form" class="space-y-4">
      <input id="email" type="email" placeholder="E-mailadres" class="w-full p-2 border rounded" required>
      <input id="password" type="password" placeholder="Wachtwoord" class="w-full p-2 border rounded" required>
      <button type="submit" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">Inloggen</button>
    </form>
    <p id="message" class="mt-4 text-center text-sm text-gray-700"></p>
    <p class="mt-4 text-center"><a href="signup.html" class="text-blue-600 underline">Nog geen account? Registreren</a></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('message').textContent = error.message;
        return;
      }

      const { data: profile } = await supabase
        .from('profiles').select('*').eq('user_id', data.user.id).single();

      localStorage.setItem('user', JSON.stringify(profile));
      location.href = 'manager.html';
    });
  </script>
</body>
</html>
