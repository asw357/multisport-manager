<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Inloggen</title>
</head>
<body>
  <h2>Inloggen</h2>
  <form id="login-form">
    <input type="email" id="email" placeholder="E-mailadres" required><br>
    <input type="password" id="password" placeholder="Wachtwoord" required><br>
    <button type="submit">Login</button>
  </form>
  <p id="message"></p>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabase
        .from('users')
        .select('*')
        .eq('email', email)
        .eq('password', password)
        .single();

      if (error || !data) {
        document.getElementById('message').textContent = 'Ongeldige inloggegevens.';
      } else {
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = 'manager.html';
      }
    });
  </script>
</body>
</html>
