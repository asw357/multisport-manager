<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inloggen — Multisport-Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">Multisport-Manager</h1>
      <nav class="flex items-center gap-3 text-sm">
        <a class="hover:underline" href="signup.html">Inschrijven</a>
      </nav>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-xl font-semibold mb-1">Inloggen</h2>
      <p class="text-sm text-slate-600 mb-6">Gebruik je e-mailadres en wachtwoord.</p>

      <form id="login-form" class="space-y-3">
        <input id="email" type="email" class="w-full border rounded-lg px-3 py-2" placeholder="E-mailadres" required />
        <input id="password" type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Wachtwoord" required />
        <button class="w-full bg-slate-900 text-white rounded-lg py-2">Inloggen</button>
      </form>

      <p id="message" class="text-sm mt-4"></p>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    const form = document.getElementById('login-form');
    const msg = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { msg.textContent = error.message; return; }

      // Profiel ophalen
      const { data: profile, error: profErr } = await supabase
        .from('profiles').select('*').eq('user_id', data.user.id).single();

      if (profErr) { msg.textContent = profErr.message; return; }

      localStorage.setItem('user', JSON.stringify(profile));
      location.href = 'manager.html';
    });
  </script>
</body>
</html>
