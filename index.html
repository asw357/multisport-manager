<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multisport-Manager</title>
  <style>
    :root{--bg1:#0d1b2a;--bg2:#1b263b;--card:#ffffff0f;--muted:#ffffffa6;--accent:#e63946;--ok:#2a9d8f}
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#fff;margin:0;background:linear-gradient(120deg,var(--bg1),var(--bg2))}
    header{padding:20px;background:#00000033;font-size:1.6rem;font-weight:700;text-align:center}
    .container{max-width:420px;margin:28px auto;background:var(--card);padding:20px;border-radius:14px;border:1px solid #ffffff22}
    h2{margin:6px 0 8px}
    input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:10px;background:#ffffff14;color:#fff;border:1px solid #ffffff22}
    button{padding:11px 12px;width:100%;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
    button:hover{filter:brightness(1.05)}
    .logout-btn{background:var(--ok)}
    .hidden{display:none}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .links a{color:#fff;text-decoration:none;padding:8px 12px;background:#ffffff1a;border-radius:10px}
    .links a:hover{background:#ffffff2a}
    .status{margin-top:8px;font-size:.9rem;color:var(--muted);min-height:1.2em;white-space:pre-line}
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>🏆 Multisport-Manager</header>

  <div class="container" id="auth-section">
    <h2>Inloggen</h2>
    <input type="email" id="login-email" placeholder="E-mail" autocomplete="username" />
    <input type="password" id="login-password" placeholder="Wachtwoord" autocomplete="current-password" />
    <button onclick="login()">Inloggen</button>

    <h2 style="margin-top:18px">Registreren</h2>
    <input type="text" id="signup-name" placeholder="Managernaam" />
    <input type="email" id="signup-email" placeholder="E-mail" autocomplete="email" />
    <input type="password" id="signup-password" placeholder="Wachtwoord" autocomplete="new-password" />
    <button onclick="signup()">Registreren</button>

    <div class="status" id="status"></div>
  </div>

  <div class="container hidden" id="profile-section">
    <h2>Welkom, <span id="manager-name"></span>!</h2>
    <p>Land: <span id="manager-country"></span></p>
    <p>MP: <span id="manager-mp"></span></p>

    <div class="row links" style="margin:10px 0">
      <a href="manager.html">Naar managerprofiel</a>
      <a href="admin.html" id="admin-link" class="hidden">Admin</a>
    </div>

    <button class="logout-btn" onclick="logout()">Uitloggen</button>
    <div class="status" id="status-in"></div>
  </div>

  <script>
    // ===== Supabase client =====
    if (!window.supabase) {
      alert("Kon Supabase library niet laden. Controleer internet/adblock.");
    }
    const SUPABASE_URL = "https://mbrehhloxonpnihetuij.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icmVoaGxveG9ucG5paGV0dWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ5Mjc0MjcsImV4cCI6MjA3MDUwMzQyN30.ehUlP9QSzYT9x3OUIDqrRcPxfZv8yTXSBwSNeOvzJ7s";
    const ADMIN_EMAIL = "wilcoboesveld12@hotmail.com";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== Kleine helpers =====
    const el = (id) => document.getElementById(id);
    const $auth = el('auth-section');
    const $profile = el('profile-section');
    const $adminLink = el('admin-link');
    const setStatus   = (msg) => el('status').textContent = msg || '';
    const setStatusIn = (msg) => el('status-in').textContent = msg || '';

    function showAuth(){ $auth.classList.remove('hidden'); $profile.classList.add('hidden'); }
    function showProfile(){ $auth.classList.add('hidden'); $profile.classList.remove('hidden'); }

    // ===== Signup/Login/Logout =====
    async function signup() {
      try {
        setStatus("Registreren…");
        const name = el('signup-name').value.trim();
        const email = el('signup-email').value.trim();
        const password = el('signup-password').value;

        if (!name || !email || !password) {
          setStatus("Vul alle velden in.");
          return;
        }

        const { data, error } = await sb.auth.signUp({
          email, password, options: { emailRedirectTo: window.location.href }
        });
        if (error) throw error;

        // Als email confirmation UIT staat heb je direct een sessie:
        const { data: s } = await sb.auth.getSession();
        if (s?.session) {
          await safeInitManager(s.session.user.id, name);
          await loadProfile();
          setStatus("");
          alert("Account aangemaakt! Je bent ingelogd.");
        } else {
          setStatus("Account aangemaakt. Check je e-mail voor bevestiging.");
          alert("Account aangemaakt! Check je e-mail voor bevestiging.");
        }
      } catch (e) {
        console.error(e);
        setStatus("Fout bij registreren: " + (e?.message || e));
        alert("Fout bij registreren: " + (e?.message || e));
      }
    }

    async function login() {
      try {
        setStatus("Inloggen…");
        const email = el('login-email').value.trim();
        const password = el('login-password').value;
        if (!email || !password) {
          setStatus("Vul e-mail en wachtwoord in.");
          return;
        }

        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;

        setStatus("");
        await loadProfile();
      } catch (e) {
        console.error(e);
        setStatus("Fout bij inloggen: " + (e?.message || e));
        alert("Fout bij inloggen: " + (e?.message || e));
      }
    }

    async function logout() {
      await sb.auth.signOut();
      showAuth();
      setStatus("Je bent uitgelogd.");
      setStatusIn("");
    }

    // ===== Init manager alleen als nog niet bestaat =====
    async function safeInitManager(userId, displayName) {
      try {
        const { data: existing, error: profErr } = await sb
          .from('my_profile').select('user_id').eq('user_id', userId).maybeSingle();
        if (profErr) console.warn('Profiel check:', profErr);
        if (existing) return;
        const { error } = await sb.rpc('init_manager', {
          p_user_id: userId, p_display_name: displayName || 'Manager'
        });
        if (error) throw error;
      } catch (e) {
        console.error('init_manager:', e);
        alert('Kon manager niet initialiseren: ' + (e?.message || e));
      }
    }

    // ===== Profiel laden =====
    async function loadProfile() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showAuth(); return; }

      const { data, error } = await sb
        .from('my_profile')
        .select('*')
        .eq('user_id', session.user.id)
        .single();

      if (error) {
        console.error(error);
        setStatusIn("Kon profiel niet laden.");
        showAuth();
        return;
      }

      el('manager-name').textContent = data.display_name || '';
      el('manager-country').textContent = data.country_name || 'Onbekend';
      el('manager-mp').textContent = data.mp ?? 0;

      if ((session.user.email || '').toLowerCase() === ADMIN_EMAIL) {
        $adminLink.classList.remove('hidden');
      } else {
        $adminLink.classList.add('hidden');
      }

      setStatus(""); setStatusIn("");
      showProfile();
    }

    // ===== Sessiewissels: na login/confirm => init + profiel =====
    sb.auth.onAuthStateChange(async (_event, session) => {
      if (session) {
        const typedName = el('signup-name')?.value?.trim();
        await safeInitManager(session.user.id, typedName || session.user.email.split('@')[0]);
        await loadProfile();
      } else {
        showAuth();
      }
    });

    // ===== Bij eerste load: toon evt. bestaand profiel =====
    loadProfile();
  </script>
</body>
</html>
