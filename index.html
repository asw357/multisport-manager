<!doctype html><html lang="nl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Multisport-Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-slate-50">
<main class="max-w-3xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-4">Multisport-Manager</h1>
  <div id="who" class="mb-6 text-slate-600">Laden…</div>
  <div class="flex gap-2">
    <a href="signup.html" class="px-3 py-2 rounded bg-blue-600 text-white">Inschrijven</a>
    <a href="login.html" class="px-3 py-2 rounded bg-slate-900 text-white">Inloggen</a>
    <a href="manager.html" class="px-3 py-2 rounded border">Manager</a>
    <a href="admin.html" class="px-3 py-2 rounded border">Admin</a>
    <a href="standings.html" class="px-3 py-2 rounded border">Klassement</a>
  </div>
</main>
<script type="module">
  import { getClient } from './config.js';
  const supabase = await getClient();
  const { data: s } = await supabase.auth.getSession();
  if (s?.session) {
    const { data: prof } = await supabase.from('profiles').select('*').eq('user_id', s.session.user.id).single();
    document.getElementById('who').textContent = `Ingelogd als ${prof?.email} ${prof?.is_admin?'(admin)':''}`;
  } else {
    document.getElementById('who').textContent = 'Niet ingelogd.';
  }
</script>
</body></html>
