<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Uitslagen invoeren (Admin)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">Uitslagen — Admin</h1>
      <nav class="flex gap-3 text-sm">
        <a class="hover:underline" href="admin.html">Admin</a>
        <a class="hover:underline" href="standings.html">Klassement</a>
        <a class="px-3 py-1 rounded bg-slate-900 text-white" href="logout.html">Uitloggen</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-6">
    <section class="bg-white rounded-2xl shadow p-6">
      <div class="flex flex-wrap gap-2 items-end">
        <div class="grow">
          <label class="text-sm">Editie</label>
          <select id="edSel" class="w-full border rounded px-3 py-2 text-sm"></select>
        </div>
        <div class="grow">
          <label class="text-sm">Event</label>
          <select id="evSel" class="w-full border rounded px-3 py-2 text-sm"></select>
        </div>
        <button id="btnLoad" class="px-3 py-2 rounded bg-slate-900 text-white text-sm">Laden</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow p-6">
      <h2 class="font-semibold mb-3">Deelnemers & uitslagen</h2>
      <form id="addForm" class="flex flex-wrap gap-2 items-end mb-3">
        <input id="athName" class="border rounded px-3 py-2 text-sm w-64" placeholder="Atleetnaam" />
        <input id="athUser" class="border rounded px-3 py-2 text-sm w-64" placeholder="Manager e-mail of user_id" />
        <input id="place" type="number" class="border rounded px-3 py-2 text-sm w-24" placeholder="Plaats" />
        <input id="perf" class="border rounded px-3 py-2 text-sm w-40" placeholder="Performance (optioneel)" />
        <button class="px-3 py-2 rounded bg-blue-600 text-white text-sm">Toevoegen</button>
      </form>

      <table class="w-full text-sm border rounded overflow-hidden">
        <thead class="bg-slate-100"><tr>
          <th class="p-2 text-left">Atleet</th><th class="p-2 text-left">Manager</th><th class="p-2 text-left">Plaats</th><th class="p-2 text-left">Performance</th><th class="p-2">Acties</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>

      <div class="mt-4 flex gap-2">
        <button id="btnFinalize" class="px-3 py-2 rounded bg-emerald-600 text-white text-sm">Finaliseer & ken MP toe</button>
        <div id="msg" class="text-sm text-slate-600"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    // Guard admin
    const { data: session } = await supabase.auth.getSession();
    if (!session?.session) location.href='login.html';
    const uid = session.session.user.id;
    const { data: me } = await supabase.from('profiles').select('*').eq('user_id', uid).single();
    if (!me?.is_admin) { alert('Alleen admins'); location.href='index.html'; }

    const edSel = document.getElementById('edSel');
    const evSel = document.getElementById('evSel');
    const rows  = document.getElementById('rows');
    const msg   = document.getElementById('msg');
    let currentEdition = null;
    let currentEvent = null;

    async function loadEditions() {
      const { data } = await supabase.from('editions').select('*').order('start_date');
      edSel.innerHTML = '';
      (data??[]).forEach(ed=>{
        const o = document.createElement('option'); o.value = ed.id; o.textContent = ed.name; edSel.appendChild(o);
      });
    }
    async function loadEvents(ed) {
      const { data } = await supabase.from('events').select('id, sub_name, gender, disciplines(name, sports(name))').eq('edition_id', ed).order('created_at');
      evSel.innerHTML = '';
      (data??[]).forEach(ev=>{
        const o = document.createElement('option');
        const label = `${ev.disciplines?.sports?.name ?? ''}${ev.disciplines?.name ? ' — '+ev.disciplines?.name : ''}${ev.sub_name ? ' — '+ev.sub_name : ''} [${ev.gender}]`;
        o.value = ev.id; o.textContent = label; evSel.appendChild(o);
      });
    }

    async function renderRows() {
      rows.innerHTML='';
      const { data } = await supabase.from('results').select('id, athlete_name, manager_email, place, performance').eq('event_id', currentEvent).order('place');
      (data??[]).forEach(r=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="p-2">${r.athlete_name ?? '-'}</td>
          <td class="p-2">${r.manager_email ?? '-'}</td>
          <td class="p-2"><input class="border rounded px-2 py-1 w-20 place" value="${r.place ?? ''}"></td>
          <td class="p-2"><input class="border rounded px-2 py-1 w-40 perf" value="${r.performance ?? ''}"></td>
          <td class="p-2 text-right">
            <button class="px-2 py-1 text-xs border rounded save">Opslaan</button>
            <button class="px-2 py-1 text-xs border rounded del">Verwijder</button>
          </td>`;
        tr.querySelector('.save').addEventListener('click', async ()=>{
          const place = parseInt(tr.querySelector('.place').value || '0',10) || null;
          const performance = tr.querySelector('.perf').value.trim() || null;
          await supabase.from('results').update({ place, performance }).eq('id', r.id);
          renderRows();
        });
        tr.querySelector('.del').addEventListener('click', async ()=>{
          await supabase.from('results').delete().eq('id', r.id);
          renderRows();
        });
        rows.appendChild(tr);
      });
    }

    document.getElementById('btnLoad').addEventListener('click', async ()=>{
      currentEdition = edSel.value;
      await loadEvents(currentEdition);
      currentEvent = evSel.value;
      await renderRows();
    });

    document.getElementById('addForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      if (!currentEvent) return;
      const athlete_name = document.getElementById('athName').value.trim() || null;
      const managerRef   = document.getElementById('athUser').value.trim();
      const place = parseInt(document.getElementById('place').value || '0',10) || null;
      const performance = document.getElementById('perf').value.trim() || null;

      // lookup manager by email or user_id → email+user_id opslaan bij result (denormalized)
      let manager_email = null, user_id = null;
      if (managerRef) {
        // probeer e-mail
        const { data: byEmail } = await supabase.from('profiles').select('user_id,email').eq('email', managerRef).maybeSingle();
        if (byEmail) { manager_email = byEmail.email; user_id = byEmail.user_id; }
        else {
          // probeer user_id
          const { data: byUid } = await supabase.from('profiles').select('user_id,email').eq('user_id', managerRef).maybeSingle();
          if (byUid) { manager_email = byUid.email; user_id = byUid.user_id; }
        }
      }

      await supabase.from('results').insert([{ event_id: currentEvent, athlete_name, manager_email, user_id, place, performance }]);
      ['athName','athUser','place','perf'].forEach(id=>document.getElementById(id).value='');
      await renderRows();
    });

    document.getElementById('btnFinalize').addEventListener('click', async ()=>{
      msg.textContent = 'Bezig met finaliseren...';
      const { error } = await supabase.rpc('admin_finalize_results_and_award_mp', { p_event_id: currentEvent });
      if (error) { msg.textContent = error.message; msg.className='text-red-600 text-sm'; return; }
      msg.textContent = 'MP toegekend en resultaten gefinaliseerd.';
      msg.className='text-emerald-700 text-sm';
    });

    await loadEditions();
  </script>
</body>
</html>
