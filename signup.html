<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Inschrijven</title>
</head>
<body>
  <h2>Inschrijven</h2>
  <form id="signup-form">
    <input type="text" placeholder="Managernaam" id="manager_name" required><br>
    <input type="email" placeholder="E-mailadres" id="email" required><br>
    <input type="password" placeholder="Wachtwoord" id="password" required><br>
    <button type="submit">Account aanmaken</button>
  </form>
  <p id="message"></p>

  <script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://yqbejgnhmizkeuxxpbbb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
);

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const manager_name = document.getElementById('manager_name').value;

  // Zoek een vrij land
  const { data: freeCountries, error: countryError } = await supabase
    .from('countries')
    .select('*')
    .eq('is_taken', false)
    .limit(1);

  if (countryError || freeCountries.length === 0) {
    document.getElementById('message').textContent = 'Geen landen meer beschikbaar!';
    return;
  }

  const assignedCountry = freeCountries[0];

  // Voeg gebruiker toe
  const { data: newUser, error: userError } = await supabase
    .from('users')
    .insert([{
      email,
      password,
      manager_name,
      country: assignedCountry.name,
      mp: 100
    }])
    .select()
    .single();

  if (userError) {
    document.getElementById('message').textContent = userError.message;
    return;
  }

  // Markeer land als gebruikt
  await supabase
    .from('countries')
    .update({ is_taken: true })
    .eq('id', assignedCountry.id);

  // Voeg startatleten toe (voorbeeld: 3 random sporten)
  const startingAthletes = [
    { name: 'Atleet 1', sport: 'Zwemmen', discipline: '100m Vrije slag' },
    { name: 'Atleet 2', sport: 'Turnen', discipline: 'Vloer' },
    { name: 'Atleet 3', sport: 'Atletiek', discipline: '200m' }
  ];

  for (const athlete of startingAthletes) {
    await supabase.from('athletes').insert([{
      user_id: newUser.id,
      name: athlete.name,
      sport: athlete.sport,
      discipline: athlete.discipline,
      stats: JSON.stringify({ snelheid: Math.random() * 10, kracht: Math.random() * 10 })
    }]);
  }

  document.getElementById('message').textContent = `Account aangemaakt! Je land is ${assignedCountry.name}. Je kunt nu inloggen.`;
});
</script>
</body>
</html>
