<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Multisport-Manager - Registreren</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-4 text-center">Account aanmaken</h1>
    <form id="signup-form" class="space-y-4">
      <input id="manager_name" type="text" placeholder="Manager naam" class="w-full p-2 border rounded" required>
      <input id="email" type="email" placeholder="E-mailadres" class="w-full p-2 border rounded" required>
      <input id="password" type="password" placeholder="Wachtwoord" class="w-full p-2 border rounded" required>
      <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Registreren</button>
    </form>
    <p id="message" class="mt-4 text-center text-sm text-gray-700"></p>
    <p class="mt-4 text-center"><a href="login.html" class="text-blue-600 underline">Al een account? Inloggen</a></p>
  </div>

 <script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabase = createClient(
  'https://yqbejgnhmizkeuxxpbbb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
);

const form = document.getElementById('signup-form');
const msg  = document.getElementById('message');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const manager_name = document.getElementById('manager_name').value.trim();

  // 1) Sign up
  const { error: signErr } = await supabase.auth.signUp({ email, password });
  if (signErr) { msg.textContent = signErr.message; return; }

  // 2) Zorg voor sessie: direct inloggen
  const { data: login, error: loginErr } =
    await supabase.auth.signInWithPassword({ email, password });
  if (loginErr) {
    // Als e-mailbevestiging AAN staat, is dit normaal.
    msg.innerHTML = 'Check je e-mail om te bevestigen en log daarna in.';
    return;
  }

  // 3) Nu we authenticated zijn: RPC draaien
  const { data: init, error: initErr } =
    await supabase.rpc('init_new_manager', { p_manager_name: manager_name });

  if (initErr) { msg.textContent = initErr.message; return; }

  msg.innerHTML = `✅ Account aangemaakt! Je land is <b>${init?.country ?? '-'}</b>. <a class="text-blue-600 underline" href="manager.html">Verder</a>.`;
});
</script>

</body>
</html>
