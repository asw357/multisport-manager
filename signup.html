<!sDOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aanmelden</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 grid place-items-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow p-6">
    <h1 class="text-xl font-bold mb-4">Account aanmaken</h1>
    <form id="form" class="space-y-3">
      <input id="name" class="w-full border rounded px-3 py-2" placeholder="Managernaam" required />
      <input id="email" type="email" class="w-full border rounded px-3 py-2" placeholder="E-mail" required />
      <input id="password" type="password" class="w-full border rounded px-3 py-2" placeholder="Wachtwoord (min. 6 tekens)" required />
      <button class="w-full bg-slate-900 text-white rounded py-2">Aanmaken</button>
    </form>
    <p class="mt-3 text-sm text-slate-600">Heb je al een account? <a class="text-blue-600 hover:underline" href="login.html">Inloggen</a></p>
    <div id="msg" class="mt-3 text-sm"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    const form = document.getElementById('form');
    const msg  = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const manager_name = document.getElementById('name').value.trim();

      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) { msg.textContent = error.message; msg.className='mt-3 text-sm text-red-600'; return; }

      // profiel aanmaken / bijwerken
      const uid = data.user?.id;
      if (uid) {
        await supabase.from('profiles').upsert({
          user_id: uid,
          email,
          manager_name,
        }, { onConflict: 'user_id' });
      }

      msg.className='mt-3 text-sm text-emerald-700';
      msg.textContent = 'Account aangemaakt. Je kunt nu inloggen.';
      setTimeout(()=>location.href='login.html', 800);
    });
  </script>
</body>
</html>
