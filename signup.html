<!DOCTYPE html>
<html lang="nl">
<hea>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inschrijven — Multisport-Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">Multisport-Manager</h1>
      <nav class="flex items-center gap-3 text-sm">
        <a class="hover:underline" href="login.html">Inloggen</a>
      </nav>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-xl font-semibold mb-1">Account aanmaken</h2>
      <p class="text-sm text-slate-600 mb-6">
        Je krijgt automatisch een vrij land, 100 MP en startatleten.
      </p>

      <form id="signup-form" class="space-y-3">
        <input id="manager_name" class="w-full border rounded-lg px-3 py-2" placeholder="Managernaam" required />
        <input id="email" type="email" class="w-full border rounded-lg px-3 py-2" placeholder="E-mailadres" required />
        <input id="password" type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Wachtwoord" required />
        <button class="w-full bg-blue-600 text-white rounded-lg py-2">Account aanmaken</button>
      </form>

      <p id="message" class="text-sm mt-4"></p>
      <div class="mt-4 text-sm">
        <a class="text-blue-600 hover:underline" href="login.html">Al een account? Inloggen</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    const form = document.getElementById('signup-form');
    const msg = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const manager_name = document.getElementById('manager_name').value.trim();

      // 1) Auth: account aanmaken
      const { data: signData, error: signErr } = await supabase.auth.signUp({ email, password });
      if (signErr) { msg.textContent = signErr.message; return; }

      // 2) Server-side init (land + profiel + atleten)
      const { data: initData, error: initErr } = await supabase.rpc('init_new_manager', { p_manager_name: manager_name });
      if (initErr) { msg.textContent = initErr.message; return; }

      msg.innerHTML =
        `✅ Account aangemaakt! Je land is <b>${initData?.country ?? '-'}</b>. ` +
        `<a class="text-blue-600 underline" href="login.html">Nu inloggen</a>.`;
    });
  </script>
</body>
</html>
