<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scouten • Multisport-Manager</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#fff;background:linear-gradient(120deg,#0d1b2a,#1b263b)}
    header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;background:#00000033}
    header a, header button{color:#fff;text-decoration:none;border:0;background:#ffffff1a;padding:8px 12px;border-radius:10px;cursor:pointer}
    header a:hover, header button:hover{background:#ffffff2a}
    .wrap{max-width:900px;margin:20px auto;padding:0 14px}
    .card{background:#ffffff12;border:1px solid #ffffff22;border-radius:14px;padding:14px;margin-bottom:14px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:10px}
    @media(max-width:820px){.grid3{display:block}}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff2a;background:#ffffff14;color:#fff}
    .btn{padding:8px 12px;border-radius:10px;border:0;background:#2a9d8f;color:#fff;cursor:pointer}
    .muted{color:#ffffffc7}
    .status{min-height:1.1em;margin-top:6px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #ffffff1f;text-align:left}
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <div class="row">
    <a href="index.html">Home</a>
    <a href="manager.html">Manager</a>
    <a href="inschrijven.html">Inschrijven</a>
    <a href="trainen.html">Trainen</a>
    <a href="scouten.html">Scouten</a>
    <a href="resultaten.html">Resultaten</a>
    <a href="admin.html">Admin</a>
  </div>
  <div class="row"><button onclick="logout()">Uitloggen</button></div>
</header>

<div class="wrap">
  <div id="auth-warning" class="card" style="display:none">
    <h2>Niet ingelogd</h2>
    <p class="muted">Log in op de <a href="index.html" style="color:#fff">homepage</a>.</p>
  </div>

  <div id="app" style="display:none">
    <section class="card">
      <h2 style="margin:0">Scout nieuwe atleet</h2>
      <p class="muted">Kies de sport en (optioneel) een onderdeel. Kosten: <span id="cost">20</span> MP.</p>
      <div class="grid3" style="margin-top:8px">
        <div><label>Sport</label><select id="sport"></select></div>
        <div><label>Event</label><select id="event"></select></div>
        <div style="align-self:end"><button class="btn" onclick="scout()">Scouten</button></div>
      </div>
      <div id="st" class="status"></div>
    </section>

    <section class="card">
      <h2 style="margin:0">Laatste 10 atleten</h2>
      <table style="margin-top:8px">
        <thead><tr><th>Sport</th><th>Onderdeel</th><th>Rating</th><th>Cap</th><th>Tijd</th></tr></thead>
        <tbody id="body"><tr><td colspan="5" class="muted">Nog niets</td></tr></tbody>
      </table>
    </section>
  </div>
</div>

<script>
  const URL="https://mbrehhloxonpnihetuij.supabase.co";
  const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icmVoaGxveG9ucG5paGV0dWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ5Mjc0MjcsImV4cCI6MjA3MDUwMzQyN30.ehUlP9QSzYT9x3OUIDqrRcPxfZv8yTXSBwSNeOvzJ7s";
  const sb = window.supabase.createClient(URL, KEY);
  let user=null, sports=[], disciplines=[], events=[], mapDiscBySport={}, mapEvByDisc={}, scoutCost=20;

  function el(id){return document.getElementById(id)}
  function logout(){ sb.auth.signOut().then(()=>location.href='index.html') }

  sb.auth.getSession().then(async r=>{
    user=r.data?.session?.user; if(!user){ el('auth-warning').style.display=''; return; }
    el('app').style.display='';
    const c=await sb.from('app_settings').select('value').eq('key','scout_cost').maybeSingle();
    if(!c.error && c.data){ scoutCost=parseInt(c.data.value||'20',10); el('cost').textContent=scoutCost; }
    loadTax().then(()=>{ fillSports(); fillEvents(); });
    loadRecent();
  });

  function loadTax(){
    return Promise.all([
      sb.from('sports').select('id,name').order('name'),
      sb.from('disciplines').select('id,name,sport_id').order('name'),
      sb.from('events').select('id,name,discipline_id,gender').order('name')
    ]).then(arr=>{
      sports=arr[0].data||[]; disciplines=arr[1].data||[]; events=arr[2].data||[];
      mapDiscBySport={}; mapEvByDisc={};
      disciplines.forEach(d=>{ (mapDiscBySport[d.sport_id]||(mapDiscBySport[d.sport_id]=[])).push(d); });
      events.forEach(e=>{ (mapEvByDisc[e.discipline_id]||(mapEvByDisc[e.discipline_id]=[])).push(e); });
    });
  }
  function fillSports(){ const s=el('sport'); s.innerHTML=''; sports.forEach(sp=>{ const o=document.createElement('option'); o.value=sp.id; o.textContent=sp.name; s.appendChild(o); }) }
  function fillEvents(){
    const sid=parseInt(el('sport').value||'0',10), sel=el('event'); sel.innerHTML='';
    const dlist=mapDiscBySport[sid]||[]; let evs=[]; dlist.forEach(d=>{ (mapEvByDisc[d.id]||[]).forEach(e=>evs.push(e)); });
    evs.forEach(e=>{ const o=document.createElement('option'); o.value=e.id; o.textContent=e.name+(e.gender?(' ('+e.gender+')'):''); sel.appendChild(o); });
  }

  async function scout(){
    el('st').textContent='Scouten…';
    const sid=parseInt(el('sport').value||'0',10), eid=parseInt(el('event').value||'0',10);
    if(!sid || !eid){ el('st').textContent='Kies sport en event'; return; }
    const sName = sports.find(x=>x.id===sid)?.name;
    const discId = events.find(x=>x.id===eid)?.discipline_id;
    const eName = events.find(x=>x.id===eid)?.name;
    const res = await sb.rpc('scout_athlete',{ p_manager_id:user.id, p_sport:sName, p_event:eName });
    if(res.error || !res.data?.ok){ el('st').textContent='Error: '+(res.error?.message || res.data?.message || ''); return; }
    el('st').textContent='Nieuw: rating '+Number(res.data.rating).toFixed(1)+' (cap '+Number(res.data.potential_max).toFixed(1)+')';
    loadRecent();
    setTimeout(()=>el('st').textContent='',2000);
  }

  async function loadRecent(){
    const r=await sb.from('athletes').select('sport,event,rating,potential_max,created_at').eq('manager_id', user.id).order('created_at',{ascending:false}).limit(10);
    const body=el('body'); body.innerHTML='';
    const arr=r.data||[]; if(!arr.length){ body.innerHTML='<tr><td colspan="5" class="muted">Nog niets</td></tr>'; return; }
    arr.forEach(a=>{
      const tr=document.createElement('tr');
      tr.innerHTML='<td>'+esc(a.sport||'')+'</td><td>'+esc(a.event||'')+'</td><td>'+num(a.rating)+'</td><td>'+num(a.potential_max)+'</td><td>'+new Date(a.created_at).toLocaleString()+'</td>';
      body.appendChild(tr);
    });
  }
  function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function num(n){return (n==null?'—':Number(n).toFixed(1))}
</script>
</body>
</html>
