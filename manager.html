<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Manager Profiel</title>
</head>
<body>
  <h2>Welkom, <span id="manager-name"></span></h2>
  <p>E-mailadres: <span id="email"></span></p>
  <p>Land: <span id="country"></span></p>
  <p>MP: <span id="mp"></span></p>

  <h3>Jouw atleten:</h3>
  <ul id="athletes-list"></ul>

  <p><a href="index.html">Terug naar homepage</a></p>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('manager-name').textContent = user.manager_name;
      document.getElementById('email').textContent = user.email;
      document.getElementById('country').textContent = user.country;
      document.getElementById('mp').textContent = user.mp;

      const { data: athletes, error } = await supabase
        .from('athletes')
        .select('*')
        .eq('user_id', user.id);

      const list = document.getElementById('athletes-list');
      athletes.forEach(a => {
        const li = document.createElement('li');
        li.textContent = `${a.name} – ${a.sport} (${a.discipline})`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
