<!doctype html><html lang="nl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-slate-50">
<header class="bg-white border-b">
  <div class="max-w-5xl mx-auto p-4 flex justify-between">
    <div class="font-bold">Manager</div>
    <nav class="flex gap-2">
      <a href="index.html" class="underline">Home</a>
      <a href="admin.html" class="underline">Admin</a>
      <a href="logout.html" class="underline">Uitloggen</a>
    </nav>
  </div>
</header>
<main class="max-w-5xl mx-auto p-4 space-y-6">
  <section class="bg-white p-4 rounded shadow">
    <h2 class="font-semibold mb-2">Profiel</h2>
    <div id="me" class="text-sm text-slate-600">Laden…</div>
    <form id="profForm" class="mt-3 flex flex-wrap gap-2">
      <input id="managerName" class="border rounded p-2" placeholder="Managernaam">
      <input id="country" class="border rounded p-2" placeholder="Land">
      <button class="px-3 py-2 rounded bg-blue-600 text-white text-sm">Opslaan</button>
    </form>
  </section>

  <section class="bg-white p-4 rounded shadow">
    <h2 class="font-semibold mb-2">Mijn atleten</h2>
    <ul id="myAthletes" class="text-sm space-y-1"></ul>
  </section>
</main>
<script type="module">
import { getClient } from './config.js';
const supabase = await getClient();
const { data: s } = await supabase.auth.getSession();
if (!s?.session) { location.href='login.html'; }

const { data: prof } = await supabase.from('profiles').select('*').eq('user_id', s.session.user.id).single();
document.getElementById('me').textContent = `${prof.email} — MP: ${prof.mp} ${prof.is_admin?'(admin)':''}`;
managerName.value = prof.manager_name ?? ''; country.value = prof.country ?? '';

profForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  await supabase.from('profiles').update({
    manager_name: managerName.value.trim(),
    country: country.value.trim()
  }).eq('user_id', s.session.user.id);
  location.reload();
});

async function loadMine(){
  const { data } = await supabase.from('athletes').select('*').eq('user_id', s.session.user.id).order('created_at',{ascending:false});
  const ul = document.getElementById('myAthletes'); ul.innerHTML='';
  (data??[]).forEach(a=>{
    const li = document.createElement('li');
    li.textContent = `${a.name} — ${a.sport} (${a.discipline})`;
    ul.appendChild(li);
  });
}
loadMine();
</script>
</body></html>
