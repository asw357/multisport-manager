<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager • Multisport-Manager</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#fff;background:linear-gradient(120deg,#0d1b2a,#1b263b)}
    header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;background:#00000033}
    header a, header button{color:#fff;text-decoration:none;border:0;background:#ffffff1a;padding:8px 12px;border-radius:10px;cursor:pointer}
    header a:hover, header button:hover{background:#ffffff2a}
    .wrap{max-width:1100px;margin:20px auto;padding:0 14px}
    .card{background:#ffffff12;border:1px solid #ffffff22;border-radius:14px;padding:14px;margin-bottom:14px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:#ffffff14;border:1px solid #ffffff1f}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #ffffff1f;text-align:left}
    input{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff2a;background:#ffffff14;color:#fff}
    .btn{padding:8px 12px;border-radius:10px;border:0;background:#2a9d8f;color:#fff;cursor:pointer}
    .muted{color:#ffffffc7}
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <div class="row">
    <a href="index.html">Home</a>
    <a href="manager.html">Manager</a>
    <a href="inschrijven.html">Inschrijven</a>
    <a href="trainen.html">Trainen</a>
    <a href="scouten.html">Scouten</a>
    <a href="resultaten.html">Resultaten</a>
    <a href="admin.html">Admin</a>
  </div>
  <div class="row"><button onclick="logout()">Uitloggen</button></div>
</header>

<div class="wrap">
  <div id="auth-warning" class="card" style="display:none">
    <h2>Niet ingelogd</h2>
    <p class="muted">Log in op de <a href="index.html" style="color:#fff">homepage</a>.</p>
  </div>

  <div id="app" style="display:none">
    <section class="card">
      <div class="row">
        <h2 style="margin:0">Jouw profiel</h2>
        <span class="pill">MP: <b id="mp">0</b></span>
        <span class="pill">Land: <b id="country">—</b></span>
        <span class="pill">E-mail: <b id="email">—</b></span>
      </div>
      <div class="row" style="margin-top:8px">
        <a class="btn" href="trainen.html">Atleten trainen</a>
        <a class="btn" href="scouten.html">Scouten</a>
        <a class="btn" href="inschrijven.html">Inschrijven</a>
        <a class="btn" href="resultaten.html">Resultaten</a>
      </div>
    </section>

    <section class="card">
      <div class="row">
        <h2 style="margin:0">Team</h2>
        <input id="q" placeholder="Zoek (sport / onderdeel)" oninput="renderAthletes()" style="flex:1;min-width:240px"/>
      </div>
      <table style="margin-top:8px">
        <thead><tr><th>Sport</th><th>Onderdeel</th><th>Rating</th><th>Cap</th><th>Aangemaakt</th></tr></thead>
        <tbody id="body"><tr><td colspan="5" class="muted">Laden…</td></tr></tbody>
      </table>
    </section>
  </div>
</div>

<script>
  const SUPABASE_URL="https://mbrehhloxonpnihetuij.supabase.co";
  const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icmVoaGxveG9ucG5paGV0dWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ5Mjc0MjcsImV4cCI6MjA3MDUwMzQyN30.ehUlP9QSzYT9x3OUIDqrRcPxfZv8yTXSBwSNeOvzJ7s";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let user=null, myMgr=null, myCountry=null, myAth=[];

  function el(id){return document.getElementById(id)}
  function logout(){ sb.auth.signOut().then(()=>location.href='index.html') }

  sb.auth.getSession().then(async r=>{
    user=r.data?.session?.user; if(!user){ document.getElementById('auth-warning').style.display=''; return; }
    document.getElementById('app').style.display='';
    el('email').textContent=user.email||user.id;
    const m=await sb.from('managers').select('mp,country_id').eq('user_id',user.id).single();
    if(!m.error && m.data){ myMgr=m.data; el('mp').textContent = m.data.mp ?? 0; }
    if(myMgr?.country_id){
      const c=await sb.from('countries').select('name').eq('id',myMgr.country_id).single();
      if(!c.error) el('country').textContent=c.data?.name||'—';
    } else { el('country').textContent='—'; }
    loadAthletes();
  });

  async function loadAthletes(){
    const r=await sb.from('athletes').select('id,sport,event,rating,potential_max,created_at').eq('manager_id', user.id).order('created_at',{ascending:false});
    if(!r.error){ myAth=r.data||[]; renderAthletes(); }
  }
  function renderAthletes(){
    const q=(el('q').value||'').toLowerCase(); const body=el('body'); body.innerHTML='';
    const list=myAth.filter(a=> !q || (a.sport||'').toLowerCase().includes(q) || (a.event||'').toLowerCase().includes(q));
    if(!list.length){ body.innerHTML='<tr><td colspan="5" class="muted">Geen atleten</td></tr>'; return; }
    list.forEach(a=>{
      const tr=document.createElement('tr');
      tr.innerHTML='<td>'+esc(a.sport||'')+'</td><td>'+esc(a.event||'')+'</td><td>'+num(a.rating)+'</td><td>'+num(a.potential_max)+'</td><td>'+new Date(a.created_at).toLocaleString()+'</td>';
      body.appendChild(tr);
    });
  }
  function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function num(n){return (n==null?'—':Number(n).toFixed(1))}
</script>
</body>
</html>
