<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manager — Multisport-Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">Manager</h1>
      <nav class="flex items-center gap-3 text-sm">
        <a class="hover:underline" href="signup.html">Inschrijven</a>
        <a class="hover:underline" href="login.html">Inloggen</a>
        <a id="adminLink" class="hover:underline hidden" href="admin.html">Admin</a>
        <a class="px-3 py-1 rounded bg-slate-900 text-white" href="logout.html">Uitloggen</a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <section class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-lg font-semibold mb-4">Profiel</h2>
      <div class="grid md:grid-cols-2 gap-4 text-sm">
        <p><span class="text-slate-500">Manager:</span> <span id="manager-name"></span></p>
        <p><span class="text-slate-500">E-mail:</span> <span id="email"></span></p>
        <p><span class="text-slate-500">Land:</span> <span id="country"></span></p>
        <p><span class="text-slate-500">MP:</span> <span id="mp"></span></p>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-lg font-semibold mb-4">Atleten</h2>
      <ul id="athletes-list" class="text-sm space-y-2"></ul>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    const { data: session } = await supabase.auth.getSession();
    if (!session?.session) { location.href = 'login.html'; }

    // Profiel ophalen (fris)
    const { data: profile, error: profErr } = await supabase
      .from('profiles').select('*').eq('user_id', session.session.user.id).single();

    if (profErr) { alert(profErr.message); location.href='login.html'; }

    localStorage.setItem('user', JSON.stringify(profile));

    document.getElementById('manager-name').textContent = profile.manager_name;
    document.getElementById('email').textContent = profile.email;
    document.getElementById('country').textContent = profile.country ?? 'Nog niet toegewezen';
    document.getElementById('mp').textContent = profile.mp ?? 0;

    if (profile.is_admin) document.getElementById('adminLink')?.classList.remove('hidden');

    // Atleten laden
    const { data: athletes } = await supabase
      .from('athletes')
      .select('*')
      .eq('user_id', profile.user_id)
      .order('created_at', { ascending: true });

    const list = document.getElementById('athletes-list');
    (athletes ?? []).forEach(a => {
      const li = document.createElement('li');
      li.className = "border rounded-lg px-3 py-2";
      li.textContent = `${a.name} — ${a.sport} (${a.discipline})`;
      list.appendChild(li);
    });
  </script>
</body>
</html>
