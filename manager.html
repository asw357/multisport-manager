<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Multisport-Manager - Manager Profiel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-white shadow p-4 flex justify-between">
    <h1 class="font-bold text-xl">Multisport-Manager</h1>
    <div class="space-x-4">
      <a href="index.html" class="text-gray-600 hover:underline">Home</a>
      <a href="admin.html" id="adminLink" class="hidden text-red-600 hover:underline">Admin</a>
      <button id="logoutBtn" class="bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">Uitloggen</button>
    </div>
  </nav>

  <main class="p-6">
    <h2 class="text-2xl font-bold mb-4">Jouw Profiel</h2>
    <p><strong>Manager:</strong> <span id="manager-name"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Land:</strong> <span id="country"></span></p>
    <p><strong>MP:</strong> <span id="mp"></span></p>

    <h3 class="mt-6 text-xl font-semibold">Jouw Atleten</h3>
    <ul id="athletes-list" class="mt-2 space-y-2"></ul>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://yqbejgnhmizkeuxxpbbb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM'
    );

    const { data: session } = await supabase.auth.getSession();
    if (!session?.session) { location.href = 'login.html'; }

    let user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.user_id !== session.session.user.id) {
      const { data: fresh } = await supabase.from('profiles').select('*').eq('user_id', session.session.user.id).single();
      user = fresh;
      localStorage.setItem('user', JSON.stringify(user));
    }

    document.getElementById('manager-name').textContent = user.manager_name;
    document.getElementById('email').textContent = user.email;
    document.getElementById('country').textContent = user.country ?? 'Nog niet toegewezen';
    document.getElementById('mp').textContent = user.mp ?? 0;

    if (user.is_admin) document.getElementById('adminLink')?.classList.remove('hidden');

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await supabase.auth.signOut();
      localStorage.removeItem('user');
      location.href = 'index.html';
    });

    const { data: athletes } = await supabase
      .from('athletes')
      .select('*')
      .eq('user_id', user.user_id)
      .order('created_at', { ascending: true });

    const list = document.getElementById('athletes-list');
    (athletes ?? []).forEach(a => {
      const li = document.createElement('li');
      li.className = "border rounded-lg px-3 py-2";
      li.textContent = `${a.name} — ${a.sport} (${a.discipline})`;
      list.appendChild(li);
    });
  </script>
</body>
</html>
