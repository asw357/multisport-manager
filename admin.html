<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • Multisport-Manager</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#fff;background:linear-gradient(120deg,#0d1b2a,#1b263b)}
    header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;background:#00000033;position:sticky;top:0}
    header a, header button{color:#fff;text-decoration:none;border:0;background:#ffffff1a;padding:8px 12px;border-radius:10px;cursor:pointer}
    header a:hover, header button:hover{background:#ffffff2a}
    .wrap{max-width:1300px;margin:20px auto;padding:0 14px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .tab{padding:8px 12px;border-radius:999px;background:#ffffff14;border:1px solid #ffffff22;cursor:pointer}
    .tab.active{background:#e63946}
    .card{background:#ffffff10;border:1px solid #ffffff22;border-radius:14px;padding:14px;margin-bottom:14px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff2a;background:#ffffff14;color:#fff}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #ffffff1f;text-align:left;font-size:.95rem;vertical-align:top}
    .pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:#ffffff14;border:1px solid #ffffff1f;font-size:.85rem}
    .status{margin-top:6px;font-size:.9rem;color:#ffffffcc;min-height:1.1em;white-space:pre-line}
    .errorbox{margin-top:8px;background:#5a1f1f;border:1px solid #ffb3b3;color:#ffdede;padding:10px;border-radius:10px;font-size:.9rem;display:none}
    .btn{display:inline-block;padding:8px 10px;border:0;border-radius:10px;cursor:pointer;font-weight:700;background:#ffffff1a;color:#fff}
    .btn.ok{background:#2a9d8f}
    .btn.warn{background:#f1c40f;color:#000}
    .btn.bad{background:#e67e22}
    .muted{color:#ffffffb5}
    .hint{font-size:.85rem;color:#ffffffd0}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:10px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(200px,1fr));gap:10px}
    .grid4{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:10px}
    @media(max-width:900px){.grid4,.grid3,.grid2{display:block}}
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <div class="row">
    <a href="index.html">Home</a>
    <a href="manager.html">Manager</a>
  </div>
  <div class="row">
    <button onclick="refreshAll()">⟳ Vernieuwen</button>
    <button onclick="logout()">Uitloggen</button>
  </div>
</header>

<div class="wrap">
  <div id="auth-warning" class="card" style="display:none">
    <h2>Niet ingelogd</h2>
    <p class="muted">Log in op de <a style="color:#fff" href="index.html">homepage</a>.</p>
  </div>

  <div id="no-admin" class="card" style="display:none">
    <h2>Geen toegang</h2>
    <p class="muted">Alleen <b>wilcoboesveld12@hotmail.com</b> mag deze pagina gebruiken.</p>
  </div>

  <div id="app" style="display:none">
    <div class="tabs">
      <button class="tab active" data-tab="countries" onclick="showTab('countries', this)">Landen</button>
      <button class="tab" data-tab="onderdelen" onclick="showTab('onderdelen', this)">Onderdeelbeheer</button>
      <button class="tab" data-tab="formats" onclick="showTab('formats', this)">Format & Ronden</button>
      <button class="tab" data-tab="starters" onclick="showTab('starters', this)">Starter-templates</button>
      <button class="tab" data-tab="config" onclick="showTab('config', this)">Config</button>
      <button class="tab" data-tab="managers" onclick="showTab('managers', this)">Managers</button>
      <button class="tab" data-tab="athletes" onclick="showTab('athletes', this)">Atleten</button>
      <button class="tab" data-tab="registrations" onclick="showTab('registrations', this)">Inschrijvingen</button>
      <button class="tab" data-tab="testsim" onclick="showTab('testsim', this)">Test-simulatie</button>
    </div>

    <!-- De bestaande secties die je al had… (Landen / Onderdeelbeheer / Formats / Starters / Config / Managers / Athletes / Testsim) -->
    <!-- Laat die ongewijzigd; ik laat ze hier weg om het korter te houden. Gebruik jouw huidige admin.html als basis en voeg ALLEEN onderstaande nieuwe tab toe -->
    <!-- ✱ ✱ ✱ Als je liever alles exact wilt: vervang je hele admin.html met dit bestand. ✱ ✱ ✱ -->

    <!-- ========== NIEUW: INSCHRIJVINGEN (ADMIN) ========== -->
    <section class="card" id="tab-registrations" style="display:none">
      <div class="row">
        <h2 style="margin:0">Inschrijvingen</h2>
        <span class="pill" id="reg-count">0</span>
      </div>

      <div class="grid3" style="margin-top:8px">
        <div>
          <label>Sport</label>
          <select id="reg-sport" onchange="fillRegEvents();loadAdminRegs()"></select>
        </div>
        <div>
          <label>Event</label>
          <select id="reg-event" onchange="loadAdminRegs()"></select>
        </div>
        <div>
          <label>Status</label>
          <select id="reg-status" onchange="loadAdminRegs()">
            <option value="">(alle)</option>
            <option value="pending">pending</option>
            <option value="confirmed">confirmed</option>
            <option value="withdrawn">withdrawn</option>
            <option value="dq">dq</option>
            <option value="resulted">resulted</option>
          </select>
        </div>
      </div>

      <table style="margin-top:10px">
        <thead>
          <tr>
            <th>Tijd</th>
            <th>Atleet</th>
            <th>Rating</th>
            <th>Manager</th>
            <th>Land</th>
            <th>Status</th>
            <th>Acties</th>
          </tr>
        </thead>
        <tbody id="reg-admin-body"><tr><td colspan="7" class="muted">Kies sport en event…</td></tr></tbody>
      </table>

      <div class="status" id="st-regadmin"></div>
      <div class="errorbox" id="err-regadmin"></div>
    </section>
  </div>
</div>

<script>
  // ===== Supabase =====
  var SUPABASE_URL = "https://mbrehhloxonpnihetuij.supabase.co";
  var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icmVoaGxveG9ucG5paGV0dWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ5Mjc0MjcsImV4cCI6MjA3MDUwMzQyN30.ehUlP9QSzYT9x3OUIDqrRcPxfZv8yTXSBwSNeOvzJ7s";
  var ADMIN_EMAIL = "wilcoboesveld12@hotmail.com";
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ===== shared state (alle tabs) =====
  var sessionUser=null;
  var sports=[], disciplines=[], events=[], venues=[], templates=[];
  var mapDiscBySport={}, mapEvByDisc={};

  // ---- Hulp (UI) ----
  function el(id){ return document.getElementById(id); }
  function setStatus(id,t){ el(id).textContent = t||''; }
  function showErr(id,m){ var b=el(id); b.style.display=m?'block':'none'; b.textContent=m||''; }
  function showTab(name, btn){
    var tabs=['countries','onderdelen','formats','starters','config','managers','athletes','registrations','testsim'], i;
    for(i=0;i<tabs.length;i++){ var s='tab-'+tabs[i]; if(el(s)) el(s).style.display=(tabs[i]===name)?'':'none'; }
    var btns=document.getElementsByClassName('tab'); for(i=0;i<btns.length;i++){ btns[i].classList.remove('active'); }
    if(btn) btn.classList.add('active');
    if(name==='registrations'){ loadAdminRegs(); }
  }
  function showAuth(){ el('auth-warning').style.display=''; el('no-admin').style.display='none'; el('app').style.display='none'; }
  function showNoAdmin(){ el('auth-warning').style.display='none'; el('no-admin').style.display=''; el('app').style.display='none'; }
  function showApp(){ el('auth-warning').style.display='none'; el('no-admin').style.display='none'; el('app').style.display=''; }
  function logout(){ sb.auth.signOut().then(()=>location.href='index.html'); }

  sb.auth.onAuthStateChange((_e,s)=>{ if(s){ init(); } else { showAuth(); } });
  init();

  function init(){
    sb.auth.getSession().then(r=>{
      sessionUser = r && r.data && r.data.session ? r.data.session.user : null;
      if(!sessionUser){ showAuth(); return; }
      if(!sessionUser.email || sessionUser.email.toLowerCase()!==ADMIN_EMAIL){ showNoAdmin(); return; }
      showApp();
      refreshAll();
    });
  }

  function refreshAll(){
    loadTaxonomy().then(()=>{ fillRegSports(); });
    // laad je andere tabs zoals je eigen admin al doet…
  }

  // ===== Taxonomy =====
  function loadTaxonomy(){
    return Promise.all([
      sb.from('sports').select('id,name').order('name'),
      sb.from('disciplines').select('id,name,sport_id').order('name'),
      sb.from('events').select('id,name,discipline_id,gender,is_active,max_athletes_per_country').order('name')
    ]).then(arr=>{
      var sp=arr[0], di=arr[1], ev=arr[2];
      if(sp.error||di.error||ev.error){ showErr('err-regadmin', (sp.error&&sp.error.message)||(di.error&&di.error.message)||(ev.error&&ev.error.message)); return; }
      sports=sp.data||[]; disciplines=di.data||[]; events=ev.data||[];
      mapDiscBySport={}; mapEvByDisc={};
      disciplines.forEach(d=>{ (mapDiscBySport[d.sport_id]||(mapDiscBySport[d.sport_id]=[])).push(d); });
      events.forEach(e=>{ (mapEvByDisc[e.discipline_id]||(mapEvByDisc[e.discipline_id]=[])).push(e); });
    });
  }

  // ===== Admin Registrations =====
  function fillRegSports(){
    var s=el('reg-sport'); s.innerHTML='';
    for(var i=0;i<sports.length;i++){ var o=document.createElement('option'); o.value=sports[i].id; o.textContent=sports[i].name; s.appendChild(o); }
    fillRegEvents();
  }
  function fillRegEvents(){
    var sportId=parseInt(el('reg-sport').value||'0',10), sel=el('reg-event'); sel.innerHTML='';
    var dlist=mapDiscBySport[sportId]||[], evs=[];
    for(var i=0;i<dlist.length;i++){ var arr=mapEvByDisc[dlist[i].id]||[]; Array.prototype.push.apply(evs, arr); }
    for(i=0;i<evs.length;i++){ var o=document.createElement('option'); o.value=evs[i].id; o.textContent=evs[i].name+(evs[i].gender?(' ('+evs[i].gender+')'):''); sel.appendChild(o); }
  }

  function loadAdminRegs(){
    var evId=parseInt(el('reg-event').value||'0',10), status=el('reg-status').value||'';
    var body=el('reg-admin-body'); body.innerHTML='';
    if(!evId){ body.innerHTML='<tr><td colspan="7" class="muted">Kies sport en event…</td></tr>'; return; }
    setStatus('st-regadmin','Laden…'); showErr('err-regadmin','');

    // 1) Registrations for event (optioneel statusfilter)
    var q = sb.from('registrations').select('id,athlete_id,manager_id,country_id,status,created_at').eq('event_id', evId).order('created_at',{ascending:true});
    if(status) q = q.eq('status', status);

    q.then(r=>{
      if(r.error){ showErr('err-regadmin', r.error.message||String(r.error)); setStatus('st-regadmin',''); return; }
      var regs = r.data||[];
      el('reg-count').textContent = String(regs.length);

      if(!regs.length){ body.innerHTML='<tr><td colspan="7" class="muted">Geen inschrijvingen</td></tr>'; setStatus('st-regadmin',''); return; }

      // 2) Batch fetch details
      var aIds=[], mIds=[], cIds=[], i;
      for(i=0;i<regs.length;i++){ aIds.push(regs[i].athlete_id); mIds.push(regs[i].manager_id); cIds.push(regs[i].country_id); }
      var pA = sb.from('athletes').select('id,sport,event,rating').in('id', aIds);
      var pM = sb.from('managers').select('user_id,email,display_name').in('user_id', mIds);
      var pC = sb.from('countries').select('id,name,code').in('id', cIds);

      Promise.all([pA,pM,pC]).then(arr=>{
        var A=arr[0], M=arr[1], C=arr[2];
        if(A.error||M.error||C.error){
          showErr('err-regadmin', (A.error&&A.error.message)||(M.error&&M.error.message)||(C.error&&C.error.message)); setStatus('st-regadmin',''); return;
        }
        var mapA={}, mapM={}, mapC={}; 
        (A.data||[]).forEach(x=>mapA[x.id]=x);
        (M.data||[]).forEach(x=>mapM[x.user_id]=x);
        (C.data||[]).forEach(x=>mapC[x.id]=x);

        // 3) Render rows
        for(i=0;i<regs.length;i++){
          var r = regs[i], a=mapA[r.athlete_id], m=mapM[r.manager_id], c=mapC[r.country_id];
          var tr=document.createElement('tr');
          tr.innerHTML =
            '<td class="muted">'+new Date(r.created_at).toLocaleString()+'</td>'+
            '<td>'+esc(a ? (a.sport+' — '+a.event) : r.athlete_id)+'</td>'+
            '<td>'+(a? Number(a.rating||0).toFixed(1) : '—')+'</td>'+
            '<td>'+esc(m ? (m.display_name||m.email||m.user_id) : r.manager_id)+'</td>'+
            '<td>'+esc(c ? (c.name || c.code || c.id) : (r.country_id||''))+'</td>'+
            '<td>'+esc(r.status)+'</td>'+
            '<td class="row">'+
              (r.status!=='confirmed' ? '<button class="btn ok" onclick="adminSetStatus(\''+r.id+'\',\'confirmed\')">Bevestig</button>' : '')+
              (r.status!=='withdrawn' ? '<button class="btn" onclick="adminSetStatus(\''+r.id+'\',\'withdrawn\')">Trek in</button>' : '')+
              '<button class="btn bad" onclick="adminDeleteReg(\''+r.id+'\')">Verwijderen</button>'+
            '</td>';
          body.appendChild(tr);
        }
        setStatus('st-regadmin','');
      });
    });
  }

  function adminSetStatus(id, status){
    setStatus('st-regadmin','Bijwerken…'); showErr('err-regadmin','');
    sb.from('registrations').update({ status: status }).eq('id', id).then(r=>{
      if(r.error){ showErr('err-regadmin', r.error.message||String(r.error)); setStatus('st-regadmin',''); return; }
      setStatus('st-regadmin','Klaar'); setTimeout(()=>setStatus('st-regadmin',''),800);
      loadAdminRegs();
    });
  }
  function adminDeleteReg(id){
    if(!confirm('Inschrijving verwijderen?')) return;
    setStatus('st-regadmin','Verwijderen…'); showErr('err-regadmin','');
    sb.from('registrations').delete().eq('id', id).then(r=>{
      if(r.error){ showErr('err-regadmin', r.error.message||String(r.error)); setStatus('st-regadmin',''); return; }
      setStatus('st-regadmin','Verwijderd'); setTimeout(()=>setStatus('st-regadmin',''),800);
      loadAdminRegs();
    });
  }

  // ===== utils =====
  function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
