<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Multisport Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-4">
  <h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>

  <!-- ====== Edities aanmaken ====== -->
  <section class="mb-6 bg-white p-4 rounded shadow">
    <h2 class="text-xl font-semibold mb-2">Nieuwe editie aanmaken</h2>
    <form id="editionForm" class="grid grid-cols-1 md:grid-cols-5 gap-2">
      <select id="edSeason" class="border rounded-lg px-3 py-2 text-sm" required>
        <option value="zomer">Zomer</option>
        <option value="winter">Winter</option>
      </select>
      <input id="edCity" class="border rounded-lg px-3 py-2 text-sm" placeholder="Gaststad" />
      <input id="edCountry" class="border rounded-lg px-3 py-2 text-sm" placeholder="Gastland" />
      <input id="edStart" type="date" class="border rounded-lg px-3 py-2 text-sm" placeholder="Start (optioneel)" />
      <input id="edEnd" type="date" class="border rounded-lg px-3 py-2 text-sm" placeholder="Eind (optioneel)" />
      <button class="md:col-span-5 px-3 py-2 rounded-lg bg-blue-600 text-white text-sm">Aanmaken</button>
    </form>

    <ul id="editionList" class="mt-4 space-y-1"></ul>
  </section>

  <!-- ====== Sporten & Onderdelen ====== -->
  <section class="mb-6 bg-white p-4 rounded shadow">
    <h2 class="text-xl font-semibold mb-2">Sporten & Onderdelen</h2>
    <form id="eventForm" class="flex flex-wrap gap-2 items-end">
      <select id="evEdition" class="border rounded-lg px-3 py-2 text-sm"></select>
      <select id="evSport" class="border rounded-lg px-3 py-2 text-sm"></select>
      <select id="evDisc" class="border rounded-lg px-3 py-2 text-sm">
        <option value="">(geen discipline)</option>
      </select>
      <input id="evOnderdeel" class="border rounded-lg px-3 py-2 text-sm" placeholder="Onderdeel" />
      <select id="evGender" class="border rounded-lg px-3 py-2 text-sm">
        <option value="M">Mannen</option>
        <option value="V">Vrouwen</option>
        <option value="X">Gemengd</option>
      </select>
      <input id="evMixedMen" type="number" class="border rounded-lg px-3 py-2 text-sm w-28 hidden" placeholder="Mannen (gemengd)">
      <input id="evMixedWomen" type="number" class="border rounded-lg px-3 py-2 text-sm w-28 hidden" placeholder="Vrouwen (gemengd)">
      <label class="flex items-center gap-2 text-sm"><input id="evTeam" type="checkbox"> Team</label>
      <input id="evMin" type="number" class="border rounded-lg px-3 py-2 text-sm w-24" placeholder="Min landen" value="2" />
      <input id="evMax" type="number" class="border rounded-lg px-3 py-2 text-sm w-24" placeholder="Max/land" value="3" />
      <input id="evRounds" class="border rounded-lg px-3 py-2 text-sm" placeholder='Rondes bv. ["finale"]' />
      <button class="px-3 py-2 rounded-lg bg-blue-600 text-white text-sm">Toevoegen</button>
    </form>

    <ul id="eventList" class="mt-4 space-y-1"></ul>
  </section>
</div>

<script>
const SUPABASE_URL = "https://yqbejgnhmizkeuxxpbbb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYmVqZ25obWl6a2V1eHhwYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1Nzg2NDksImV4cCI6MjA3MDE1NDY0OX0.L_v6XgPh7F6KrWKlu72f6jbL_QTU-hdMQa0lA-QFryM";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Load data
async function loadEditions() {
  const { data } = await supabase.from('editions').select('*').order('created_at');
  const list = document.getElementById('editionList');
  const select = document.getElementById('evEdition');
  list.innerHTML = '';
  select.innerHTML = '';
  data.forEach(ed => {
    const li = document.createElement('li');
    li.textContent = `${ed.name} (${ed.season}) - ${ed.host_city}, ${ed.host_country}`;
    list.appendChild(li);
    const opt = document.createElement('option');
    opt.value = ed.id;
    opt.textContent = ed.name;
    select.appendChild(opt);
  });
}

async function loadSports() {
  const { data } = await supabase.from('sports').select('*').order('name');
  const select = document.getElementById('evSport');
  select.innerHTML = '';
  data.forEach(sp => {
    const opt = document.createElement('option');
    opt.value = sp.id;
    opt.textContent = sp.name;
    select.appendChild(opt);
  });
}

async function loadDisciplines() {
  const { data } = await supabase.from('disciplines').select('*').order('name');
  const select = document.getElementById('evDisc');
  select.innerHTML = '<option value="">(geen discipline)</option>';
  data.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.name;
    select.appendChild(opt);
  });
}

async function loadEvents() {
  const { data } = await supabase.from('events')
    .select('*, disciplines(name, sports(name))')
    .order('created_at');
  const list = document.getElementById('eventList');
  list.innerHTML = '';
  data.forEach(ev => {
    const li = document.createElement('li');
    li.textContent = `${ev.disciplines?.sports?.name ?? '(sport)'} - ${ev.disciplines?.name ?? '(geen discipline)'} | ${ev.sub_name ?? ''} | ${ev.gender}`;
    list.appendChild(li);
  });
}

// Edition form submit
document.getElementById('editionForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const season = document.getElementById('edSeason').value;
  const city = document.getElementById('edCity').value.trim();
  const country = document.getElementById('edCountry').value.trim();
  const start = document.getElementById('edStart').value || null;
  const end = document.getElementById('edEnd').value || null;
  const { data: id, error } = await supabase.rpc('admin_create_edition', {
    p_season: season, p_host_city: city, p_host_country: country
  });
  if (error) { alert(error.message); return; }
  if (start || end) {
    await supabase.from('editions').update({ start_date: start, end_date: end }).eq('id', id);
  }
  await loadEditions();
});

// Gender change for mixed
document.getElementById('evGender').addEventListener('change', () => {
  const mixed = document.getElementById('evGender').value === 'X';
  document.getElementById('evMixedMen').classList.toggle('hidden', !mixed);
  document.getElementById('evMixedWomen').classList.toggle('hidden', !mixed);
});

// Event form submit (FIXED: preventDefault)
document.getElementById('eventForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const edition_id = document.getElementById('evEdition').value;
  const sport_id = parseInt(document.getElementById('evSport').value);
  const discVal = document.getElementById('evDisc').value;
  const discipline_id = discVal ? parseInt(discVal) : null;
  const sub_name = document.getElementById('evOnderdeel').value.trim() || null;
  const gender = document.getElementById('evGender').value;
  const is_team = document.getElementById('evTeam').checked;
  const min_countries = parseInt(document.getElementById('evMin').value || '2');
  const max_per_country = parseInt(document.getElementById('evMax').value || '3');
  let rounds;
  try { rounds = JSON.parse(document.getElementById('evRounds').value || '["finale"]'); }
  catch { rounds = ["finale"]; }
  const mixed_male_count = gender === 'X' ? parseInt(document.getElementById('evMixedMen').value || '0') : null;
  const mixed_female_count = gender === 'X' ? parseInt(document.getElementById('evMixedWomen').value || '0') : null;

  const { error } = await supabase.rpc('admin_create_event2', {
    p_edition_id: edition_id,
    p_sport_id: sport_id,
    p_discipline_id: discipline_id,
    p_sub_name: sub_name,
    p_gender: gender,
    p_is_team: is_team,
    p_min_countries: min_countries,
    p_max_per_country: max_per_country,
    p_rounds: rounds,
    p_format: {},
    p_mixed_male_count: mixed_male_count,
    p_mixed_female_count: mixed_female_count
  });
  if (error) { alert(error.message); return; }
  await loadEvents();
});

// Init
(async () => {
  await loadEditions();
  await loadSports();
  await loadDisciplines();
  await loadEvents();
})();
</script>
</body>
</html>
