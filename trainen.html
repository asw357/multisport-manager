<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trainen • Multisport-Manager</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#fff;background:linear-gradient(120deg,#0d1b2a,#1b263b)}
    header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;background:#00000033}
    header a, header button{color:#fff;text-decoration:none;border:0;background:#ffffff1a;padding:8px 12px;border-radius:10px;cursor:pointer}
    header a:hover, header button:hover{background:#ffffff2a}
    .wrap{max-width:1100px;margin:20px auto;padding:0 14px}
    .card{background:#ffffff12;border:1px solid #ffffff22;border-radius:14px;padding:14px;margin-bottom:14px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #ffffff1f;text-align:left}
    input{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff2a;background:#ffffff14;color:#fff}
    .btn{padding:8px 12px;border-radius:10px;border:0;background:#2a9d8f;color:#fff;cursor:pointer}
    .muted{color:#ffffffc7}
    .status{min-height:1.1em;margin-top:6px}
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <div class="row">
    <a href="index.html">Home</a>
    <a href="manager.html">Manager</a>
    <a href="inschrijven.html">Inschrijven</a>
    <a href="trainen.html">Trainen</a>
    <a href="scouten.html">Scouten</a>
    <a href="resultaten.html">Resultaten</a>
    <a href="admin.html">Admin</a>
  </div>
  <div class="row"><button onclick="logout()">Uitloggen</button></div>
</header>

<div class="wrap">
  <div id="auth-warning" class="card" style="display:none">
    <h2>Niet ingelogd</h2>
    <p class="muted">Log in op de <a href="index.html" style="color:#fff">homepage</a>.</p>
  </div>

  <div id="app" style="display:none">
    <section class="card">
      <h2 style="margin:0">Trainen</h2>
      <p class="muted">Elke klik traint de atleet: <b>+0.1 rating</b> (tot hun verborgen cap). Kosten: <span id="cost">5</span> MP.</p>
      <input id="q" placeholder="Zoek (sport / onderdeel)" oninput="render()"/>
      <table style="margin-top:8px">
        <thead><tr><th>Sport</th><th>Onderdeel</th><th>Rating</th><th>Cap</th><th>Actie</th></tr></thead>
        <tbody id="body"><tr><td colspan="5" class="muted">Laden…</td></tr></tbody>
      </table>
      <div id="st" class="status"></div>
    </section>
  </div>
</div>

<script>
  const URL="https://mbrehhloxonpnihetuij.supabase.co";
  const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icmVoaGxveG9ucG5paGV0dWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ5Mjc0MjcsImV4cCI6MjA3MDUwMzQyN30.ehUlP9QSzYT9x3OUIDqrRcPxfZv8yTXSBwSNeOvzJ7s";
  const sb = window.supabase.createClient(URL, KEY);
  let user=null, list=[], trainCost=5;

  function el(id){return document.getElementById(id)}
  function logout(){ sb.auth.signOut().then(()=>location.href='index.html') }

  sb.auth.getSession().then(async r=>{
    user=r.data?.session?.user; if(!user){ el('auth-warning').style.display=''; return; }
    el('app').style.display='';
    const cost=await sb.from('app_settings').select('value').eq('key','train_cost').maybeSingle();
    if(!cost.error && cost.data) { trainCost = parseInt(cost.data.value||'5',10); el('cost').textContent=trainCost; }
    load();
  });

  async function load(){
    const r=await sb.from('athletes').select('id,sport,event,rating,potential_max').eq('manager_id',user.id).order('created_at',{ascending:false});
    list=r.data||[]; render();
  }
  function render(){
    const q=(el('q').value||'').toLowerCase(); const body=el('body'); body.innerHTML='';
    const arr=list.filter(a=> !q || (a.sport||'').toLowerCase().includes(q) || (a.event||'').toLowerCase().includes(q));
    if(!arr.length){ body.innerHTML='<tr><td colspan="5" class="muted">Geen atleten</td></tr>'; return; }
    arr.forEach(a=>{
      const tr=document.createElement('tr');
      tr.innerHTML='<td>'+esc(a.sport||'')+'</td><td>'+esc(a.event||'')+'</td><td>'+num(a.rating)+'</td><td>'+num(a.potential_max)+'</td><td><button class="btn" onclick="train(\''+a.id+'\')">Train</button></td>';
      body.appendChild(tr);
    });
  }
  async function train(id){
    el('st').textContent='Trainen…';
    const r=await sb.rpc('train_athlete',{ p_manager_id:user.id, p_athlete_id:id, p_plan:{s:1} });
    if(r.error || !r.data?.ok){ el('st').textContent='Error: '+(r.error?.message || r.data?.message || ''); return; }
    el('st').textContent='OK (+0.1, MP -'+r.data.mp_spent+')';
    load();
    setTimeout(()=>el('st').textContent='',1000);
  }
  function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function num(n){return (n==null?'—':Number(n).toFixed(1))}
</script>
</body>
</html>
