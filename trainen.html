<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atleten trainen • Multisport-Manager</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#fff;background:linear-gradient(120deg,#0d1b2a,#1b263b)}
    header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;background:#00000033;position:sticky;top:0}
    header a, header button{color:#fff;text-decoration:none;border:0;background:#ffffff1a;padding:8px 12px;border-radius:10px;cursor:pointer}
    header a:hover, header button:hover{background:#ffffff2a}
    .wrap{max-width:900px;margin:20px auto;padding:0 14px}
    .card{background:#ffffff10;border:1px solid #ffffff22;border-radius:14px;padding:14px;margin-bottom:14px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff2a;background:#ffffff14;color:#fff}
    .btn{display:inline-block;padding:10px 12px;border:0;border-radius:10px;cursor:pointer;font-weight:700;background:#2a9d8f;color:#fff}
    .status{margin-top:6px;font-size:.9rem;color:#ffffffcc;min-height:1.1em;white-space:pre-line}
    .errorbox{margin-top:8px;background:#5a1f1f;border:1px solid #ffb3b3;color:#ffdede;padding:10px;border-radius:10px;font-size:.9rem;display:none}
    .muted{color:#ffffffb5}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #ffffff1f;text-align:left;font-size:.95rem}
    .pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:#ffffff14;border:1px solid #ffffff1f;font-size:.85rem}
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <div class="row">
    <a href="index.html">Home</a>
    <a href="manager.html">Manager</a>
  </div>
  <div class="row">
    <button onclick="refreshAll()">⟳ Vernieuwen</button>
    <button onclick="logout()">Uitloggen</button>
  </div>
</header>

<div class="wrap">
  <div id="auth-warning" class="card" style="display:none">
    <h2>Niet ingelogd</h2>
    <p class="muted">Log in op de <a href="index.html" style="color:#fff">homepage</a>.</p>
  </div>

  <div id="app" style="display:none">
    <section class="card">
      <h2 style="margin:0">Kies atleet</h2>
      <div class="row" style="margin-top:8px">
        <select id="athSel" style="flex:2;min-width:240px" onchange="bindAthlete()">
          <option value="">— selecteer —</option>
        </select>
        <span class="pill">MP: <span id="mp">0</span></span>
      </div>
      <div class="status" id="st-ath"></div>
      <div class="errorbox" id="err-ath"></div>
      <table style="margin-top:8px">
        <tbody>
          <tr><th>Sport</th><td id="ath-sport" class="muted">—</td></tr>
          <tr><th>Onderdeel</th><td id="ath-event" class="muted">—</td></tr>
          <tr><th>Rating</th><td id="ath-rating" class="muted">—</td></tr>
          <tr><th>Stats</th><td id="ath-stats" class="muted">—</td></tr>
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2 style="margin:0">Trainingsplan</h2>
      <div class="row" style="margin-top:8px">
        <input id="plan-speed" type="number" min="0" value="0" placeholder="speed (+)"/>
        <input id="plan-endurance" type="number" min="0" value="0" placeholder="endurance (+)"/>
        <input id="plan-technique" type="number" min="0" value="0" placeholder="technique (+)"/>
        <input id="plan-power" type="number" min="0" value="0" placeholder="power (+)"/>
      </div>
      <div class="row" style="margin-top:8px">
        <label class="pill">Kosten per sessie: <span id="cost">5</span> MP</label>
        <button class="btn" onclick="train()">Train</button>
      </div>
      <div class="status" id="st-train"></div>
      <div class="errorbox" id="err-train"></div>
    </section>
  </div>
</div>

<script>
  if(!window.supabase){ alert("Kon Supabase library niet laden."); }
  var SUPABASE_URL="https://mbrehhloxonpnihetuij.supabase.co";
  var SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icmVoaGxveG9ucG5paGV0dWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ5Mjc0MjcsImV4cCI6MjA3MDUwMzQyN30.ehUlP9QSzYT9x3OUIDqrRcPxfZv8yTXSBwSNeOvzJ7s";
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var sessionUser = null;
  var athletes = []; var current = null; var mpVal = 0;

  function el(id){ return document.getElementById(id); }
  function setStatus(id,t){ el(id).textContent = t||''; }
  function showErr(id,m){ var b=el(id); b.style.display=m?'block':'none'; b.textContent=m||''; }

  sb.auth.onAuthStateChange(function(_e,s){ if(s){ boot(); } else { showAuth(); } });
  boot();

  function showAuth(){ el('auth-warning').style.display=''; el('app').style.display='none'; }
  function showApp(){ el('auth-warning').style.display='none'; el('app').style.display=''; }

  function boot(){
    sb.auth.getSession().then(function(r){
      sessionUser = r && r.data && r.data.session ? r.data.session.user : null;
      if(!sessionUser){ showAuth(); return; }
      showApp();
      refreshAll();
    });
  }

  function refreshAll(){ loadSettings(); loadMP(); loadAthletes(); }

  function logout(){ sb.auth.signOut().then(function(){ window.location.href='index.html'; }); }

  function loadSettings(){
    // train_cost uit app_settings
    sb.from('app_settings').select('value').eq('key','train_cost').single().then(function(r){
      if(!r.error && r.data){ el('cost').textContent = parseInt(String(r.data.value)||'5',10); }
    });
  }

  function loadMP(){
    sb.from('managers').select('mp').eq('user_id', sessionUser.id).single().then(function(r){
      if(!r.error){ mpVal = r.data.mp||0; el('mp').textContent = mpVal; }
    });
  }

  function loadAthletes(){
    setStatus('st-ath','Laden…'); showErr('err-ath','');
    sb.from('athletes').select('id,sport,event,rating,stats').order('created_at',{ascending:false})
      .then(function(r){
        if(r.error){ showErr('err-ath', r.error.message||String(r.error)); setStatus('st-ath',''); return; }
        athletes = r.data||[];
        var sel = el('athSel'); sel.innerHTML = '<option value="">— selecteer —</option>';
        for(var i=0;i<athletes.length;i++){
          var a = athletes[i];
          var opt = document.createElement('option');
          opt.value = a.id; opt.textContent = (a.sport||'?')+' — '+(a.event||'?')+' (r='+Number(a.rating||0).toFixed(1)+')';
          sel.appendChild(opt);
        }
        setStatus('st-ath','');
        bindAthlete();
      });
  }

  function bindAthlete(){
    var id = el('athSel').value; current = null;
    for(var i=0;i<athletes.length;i++){ if(athletes[i].id===id){ current = athletes[i]; break; } }
    el('ath-sport').textContent = current ? (current.sport||'') : '—';
    el('ath-event').textContent = current ? (current.event||'') : '—';
    el('ath-rating').textContent = current ? Number(current.rating||0).toFixed(1) : '—';
    el('ath-stats').textContent = current ? JSON.stringify(current.stats||{}) : '—';
  }

  function train(){
    if(!current){ alert('Kies eerst een atleet.'); return; }
    var cost = parseInt(el('cost').textContent||'5',10);
    if(mpVal < cost){ alert('Onvoldoende MP.'); return; }

    var plan = {};
    var p1 = parseInt(el('plan-speed').value||'0',10);
    var p2 = parseInt(el('plan-endurance').value||'0',10);
    var p3 = parseInt(el('plan-technique').value||'0',10);
    var p4 = parseInt(el('plan-power').value||'0',10);
    if(p1) plan.speed = p1;
    if(p2) plan.endurance = p2;
    if(p3) plan.technique = p3;
    if(p4) plan.power = p4;

    setStatus('st-train','Training uitvoeren…'); showErr('err-train','');
    sb.rpc('train_athlete', { p_manager_id: sessionUser.id, p_athlete_id: current.id, p_plan: plan, p_mp_cost: null })
      .then(function(r){
        if(r.error){ showErr('err-train', r.error.message||String(r.error)); setStatus('st-train',''); return; }
        if(!r.data || !r.data.ok){ showErr('err-train', (r.data && r.data.message) || 'Onbekende fout'); setStatus('st-train',''); return; }
        setStatus('st-train','Succes! Rating geüpdatet, MP -'+(r.data.mp_spent||cost));
        // refresh
        loadMP(); loadAthletes();
      });
  }
</script>
</body>
</html>
