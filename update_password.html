<!DOCTYPE html><html lang="nl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title data-i18n="update_title">Nieuw wachtwoord instellen</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="min-h-screen bg-slate-50 grid place-items-center p-4">
<div class="w-full max-w-md bg-white rounded-2xl shadow p-6">
  <h1 class="text-xl font-bold mb-4" data-i18n="update_title">Nieuw wachtwoord instellen</h1>
  <form id="form" class="space-y-3">
    <input id="password" type="password" class="w-full border rounded px-3 py-2" placeholder="Nieuw wachtwoord" required/>
    <button class="w-full bg-slate-900 text-white rounded py-2">Opslaan</button>
  </form>
  <div id="msg" class="mt-3 text-sm"></div>
</div>
<script type="module">
  import { supabase } from './js/supabaseClient.js';
  import './js/i18n.js';
  const msg=document.getElementById('msg');
  document.getElementById('form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const password=document.getElementById('password').value;
    const { data, error } = await supabase.auth.updateUser({ password });
    msg.className='mt-3 text-sm ' + (error ? 'text-red-600':'text-emerald-700');
    msg.textContent = error ? error.message : 'Wachtwoord bijgewerkt. Je kunt nu inloggen.';
    if (!error) setTimeout(()=>location.href='login.html', 800);
  });
</script>
</body></html>
